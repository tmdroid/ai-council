<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Council Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --purple: #bc8cff;
  --orange: #f0883e;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* === Sidebar === */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-header h1 .logo {
  width: 24px; height: 24px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--bg);
}

.new-session-btn {
  margin-top: 12px;
  width: 100%;
  padding: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.new-session-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.session-item {
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 4px;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.session-item:hover { background: var(--bg3); }
.session-item.active { background: var(--bg3); border-color: var(--accent); }

.session-item .task {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.session-item .meta {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block;
}
.status-dot.running { background: var(--green); }
.status-dot.stopped { background: var(--red); }
.status-dot.created { background: var(--yellow); }
.status-dot.archived { background: var(--text-dim); }

/* === Main Area === */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.main-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 53px;
}

.main-header .title {
  font-size: 15px;
  font-weight: 600;
}
.main-header .subtitle {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: var(--bg2); border-color: var(--accent); }
.btn.danger { color: var(--red); }
.btn.danger:hover { background: rgba(248,81,73,0.1); border-color: var(--red); }
.btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.btn.primary:hover { opacity: 0.9; }

/* === Conversation === */
.conversation {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}

.msg.system {
  align-self: center;
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  font-style: italic;
  padding: 4px 8px;
  max-width: 100%;
}
.msg.task {
  align-self: center;
  background: var(--bg3);
  border: 1px solid var(--accent);
  color: var(--text);
  font-weight: 500;
  max-width: 90%;
}
.msg.vote_proposal {
  align-self: center;
  background: rgba(210,153,34,0.1);
  border: 1px solid var(--yellow);
  color: var(--yellow);
  font-size: 12px;
}
.msg.vote_response {
  align-self: center;
  color: var(--text-dim);
  font-size: 12px;
  font-style: italic;
}
.msg.vote_closed {
  align-self: center;
  background: rgba(63,185,80,0.1);
  border: 1px solid var(--green);
  color: var(--green);
  font-size: 12px;
  font-weight: 500;
}
.msg.message {
  background: var(--bg2);
  border: 1px solid var(--border);
}
.msg .role-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  margin-bottom: 4px;
}
.role-supervisor { background: var(--purple); color: var(--bg); }
.role-planner { background: var(--accent); color: var(--bg); }
.role-architect { background: var(--orange); color: var(--bg); }
.role-coder { background: var(--green); color: var(--bg); }
.role-reviewer { background: var(--yellow); color: var(--bg); }
.role-tester { background: #f778ba; color: var(--bg); }
.role-researcher { background: #79c0ff; color: var(--bg); }
.role-security { background: var(--red); color: var(--bg); }

/* === Vote Banner === */
.vote-banner {
  background: var(--bg3);
  border: 1px solid var(--yellow);
  border-radius: 10px;
  padding: 12px 16px;
  margin: 8px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.vote-banner .info { flex: 1; }
.vote-banner .proposal { font-size: 13px; font-weight: 500; }
.vote-banner .tally { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.vote-banner .actions { display: flex; gap: 6px; }
.vote-btn {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
}
.vote-btn:hover { opacity: 0.85; }
.vote-btn.approve { border-color: var(--green); color: var(--green); }
.vote-btn.reject { border-color: var(--red); color: var(--red); }
.vote-btn.changes { border-color: var(--yellow); color: var(--yellow); }

/* === Input Area === */
.input-area {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-area textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  padding: 10px 12px;
  resize: none;
  min-height: 40px;
  max-height: 120px;
  font-family: inherit;
}
.input-area textarea:focus { outline: none; border-color: var(--accent); }
.input-area textarea::placeholder { color: var(--text-dim); }

.send-btn {
  padding: 10px 16px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.send-btn:hover { opacity: 0.9; }
.send-btn:disabled { opacity: 0.4; cursor: default; }

/* === Right Panel — Agents === */
.agents-panel {
  width: 240px;
  min-width: 240px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.agents-panel h3 {
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}

.agent-card {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.agent-card .name {
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}
.agent-card .backend {
  font-size: 11px;
  color: var(--text-dim);
}
.agent-card .role-tag {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
}
.agent-card .status {
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* === Empty State === */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  gap: 12px;
}
.empty-state .icon { font-size: 48px; }
.empty-state .text { font-size: 15px; }
.empty-state .sub { font-size: 12px; }

/* === Modal === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 500px;
  max-width: 90vw;
}
.modal h2 { font-size: 16px; margin-bottom: 16px; }
.modal .field { margin-bottom: 14px; }
.modal label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.modal input, .modal textarea, .modal select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 8px 10px;
  font-size: 13px;
  font-family: inherit;
}
.modal textarea { min-height: 80px; resize: vertical; }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal .hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* === Scrollbar === */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

.mention-highlight {
  background: rgba(88,166,255,0.2);
  padding: 1px 4px;
  border-radius: 3px;
  color: var(--accent);
}

/* === Mention Dropdown === */
.mention-dropdown {
  position: absolute;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  max-height: 200px;
  overflow-y: auto;
  min-width: 200px;
  z-index: 50;
  display: none;
}
.mention-dropdown.visible { display: block; }
.mention-item {
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.mention-item:last-child { border-bottom: none; }
.mention-item:hover, .mention-item.selected {
  background: var(--bg2);
}
.mention-item .role-tag {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
}
.mention-item .id { color: var(--text); }
.mention-item .filter-match { color: var(--accent); }
.mention-item .dim { color: var(--text-dim); font-size: 11px; margin-left: auto; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1><span class="logo">C</span> AI Council</h1>
    <button class="new-session-btn" onclick="showNewSessionModal()">+ New Session</button>
  </div>
  <div class="session-list" id="sessionList">
    <!-- sessions populated by JS -->
  </div>
</div>

<!-- Main conversation area -->
<div class="main" id="mainArea">
  <div class="empty-state" id="emptyState">
    <div class="icon">🏛️</div>
    <div class="text">No session selected</div>
    <div class="sub">Create a new session to start a council debate</div>
  </div>
</div>

<!-- Agents panel -->
<div class="agents-panel" id="agentsPanel" style="display:none;">
  <h3>Agents</h3>
  <div id="agentList"></div>
</div>

<!-- New Session Modal -->
<div class="modal-overlay" id="newSessionModal" style="display:none;">
  <div class="modal">
    <h2>Start New Council Session</h2>
    <div class="field">
      <label>Task Description</label>
      <textarea id="taskInput" placeholder="e.g., Add dark mode toggle to settings screen with state management and tests"></textarea>
    </div>
    <div class="field">
      <label>Working Directory</label>
      <input id="workdirInput" placeholder="/home/hermes/my-project" value=".">
    </div>
    <div class="field">
      <label>Consensus Rule</label>
      <select id="consensusInput">
        <option value="majority">Majority (>50%)</option>
        <option value="supermajority">Supermajority (>67%)</option>
        <option value="unanimous">Unanimous (100%)</option>
      </select>
    </div>
    <div class="field">
      <label>Auto-start agents</label>
      <select id="autoStartInput">
        <option value="false" selected>No — I'll start them manually after reviewing the task</option>
        <option value="true">Yes — compose team and start immediately</option>
      </select>
      <div class="hint">The supervisor will analyze the task and decide which agents to spawn (planner, coder, reviewer, etc.)</div>
    </div>
    <div class="actions">
      <button class="btn" onclick="hideNewSessionModal()">Cancel</button>
      <button class="btn primary" onclick="createSession()">Create Session</button>
    </div>
  </div>
</div>

<!-- Socket.IO client library -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
let currentSessionId = null;
let socket = null;

// === Socket.IO ===

function connectSocket() {
  if (socket) return;
  socket = io();
  socket.on("connect", () => console.log("[ws] connected"));
  socket.on("disconnect", () => console.log("[ws] disconnected"));
  socket.on("state", (data) => { if (currentSessionId) renderSession(data); });
  socket.on("message", (msg) => { appendMessage(msg); });
  socket.on("vote", (data) => { renderVotes(); });
  socket.on("error", (err) => { console.error("[ws] error:", err); });
}

// === API ===

async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type': 'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(path, opts);
  return resp.json();
}

// === Session List ===

async function loadSessions() {
  const data = await api('GET', '/api/sessions');
  const list = document.getElementById('sessionList');
  list.innerHTML = '';
  if (data.sessions.length === 0) {
    list.innerHTML = '<div style="padding:16px;color:var(--text-dim);font-size:12px;">No sessions yet. Create one to get started.</div>';
    return;
  }
  data.sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
    const time = new Date(s.created_at * 1000).toLocaleString();
    div.innerHTML = `
      <div class="task">${escapeHtml(s.task)}</div>
      <div class="meta">
        <span class="status-dot ${s.status}"></span>
        ${s.status} · ${time}
      </div>`;
    div.onclick = () => selectSession(s.id);
    list.appendChild(div);
  });
}

// === Select Session ===

async function selectSession(id) {
  currentSessionId = id;
  connectSocket();

  // Leave previous session room
  if (socket && socket.connected) {
    socket.emit("leave_session", { session_id: id });
  }

  loadSessions();
  const data = await api('GET', `/api/sessions/${id}`);
  renderSession(data);

  // Join the session room via Socket.IO for real-time updates
  socket.emit("join_session", { session_id: id });
}

// === Render Session ===

function renderSession(data) {
  const main = document.getElementById('mainArea');
  const agentsPanel = document.getElementById('agentsPanel');

  main.innerHTML = `
    <div class="main-header">
      <div>
        <div class="title">${escapeHtml(data.task)}</div>
        <div class="subtitle">
          <span class="status-dot ${data.status}"></span>
          ${data.status} · ${data.consensus} · ${data.workdir}
          ${data.message_count ? ' · ' + data.message_count + ' messages' : ''}
        </div>
      </div>
      <div class="header-actions">
        ${data.status === 'running' ? '<button class="btn danger" onclick="stopAgents()">Stop Agents</button>' : ''}
        ${data.status !== 'running' ? '<button class="btn primary" onclick="startAgents()">Start Agents</button>' : ''}
        <button class="btn danger" onclick="deleteSession()">Delete</button>
      </div>
    </div>
    <div class="conversation" id="conversation"></div>
    <div class="input-area">
      <textarea id="msgInput" placeholder="Type a message to the council... Use @ to mention an agent" rows="1" onkeydown="handleInputKey(event)" oninput="handleInput(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div class="mention-dropdown" id="mentionDropdown"></div>
  `;

  // Render messages
  const conv = document.getElementById('conversation');
  (data.messages || []).forEach(msg => appendMessage(msg, conv));

  // Render agents
  agentsPanel.style.display = 'flex';
  renderAgents(data);

  // Populate currentMembers for @mention
  currentMembers = [];
  (data.agents || []).forEach(a => {
    currentMembers.push({ id: a.id, role: a.role, model: `${a.backend}/${a.model || 'default'}` });
  });
  // Add human
  currentMembers.push({ id: 'human', role: 'supervisor', model: 'you' });

  // Render open votes
  renderVotes(data);
}

function appendMessage(msg, container) {
  const conv = container || document.getElementById('conversation');
  if (!conv) return;
  const div = document.createElement('div');
  const role = msg.role || '?';
  const mtype = msg.type || 'message';
  div.className = `msg ${mtype}`;

  if (mtype === 'message') {
    const roleClass = `role-${role}`;
    let content = escapeHtml(msg.content || '');
    // Highlight @mentions
    content = content.replace(/@(\S+)/g, '<span class="mention-highlight">@$1</span>');
    div.innerHTML = `<span class="role-tag ${roleClass}">${role}</span>\n${content}`;
  } else if (mtype === 'task') {
    div.innerHTML = `📋 ${escapeHtml(msg.content)}`;
  } else if (mtype === 'system') {
    div.textContent = msg.content;
  } else if (mtype === 'vote_proposal') {
    div.innerHTML = `🗳️ ${escapeHtml(msg.content)}`;
  } else if (mtype === 'vote_response') {
    div.textContent = msg.content;
  } else if (mtype === 'vote_closed') {
    div.innerHTML = `✅ ${escapeHtml(msg.content)}`;
  } else {
    div.textContent = msg.content;
  }

  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
}

// === Agents Panel ===

function renderAgents(data) {
  const list = document.getElementById('agentList');
  list.innerHTML = '';
  const members = data.members || {};
  const agents = data.agents || [];

  // Show configured agents
  agents.forEach(a => {
    const member = Object.entries(members).find(([id, m]) => id === a.id);
    const online = member && true;
    const div = document.createElement('div');
    div.className = 'agent-card';
    div.innerHTML = `
      <div class="name">
        <span class="status-dot ${online ? 'running' : 'stopped'}"></span>
        ${a.id}
      </div>
      <div class="backend">${a.backend}/${a.model || 'default'} · ${a.read_only ? 'RO' : 'RW'}</div>
      <span class="role-tag role-${a.role}">${a.role}</span>
    `;
    list.appendChild(div);
  });

  // Show human
  const humanDiv = document.createElement('div');
  humanDiv.className = 'agent-card';
  humanDiv.innerHTML = `
    <div class="name"><span class="status-dot running"></span> human</div>
    <div class="backend">You — supervisor</div>
    <span class="role-tag role-supervisor">supervisor</span>
  `;
  list.appendChild(humanDiv);
}

function updateAgents(msg) {
  // Could update agent status based on messages, for now just re-render
}

// === Votes ===

function renderVotes(data) {
  const conv = document.getElementById('conversation');
  if (!conv) return;

  // Get current session state for open votes
  if (currentSessionId) {
    api('GET', `/api/sessions/${currentSessionId}`).then(data => {
      (data.open_votes || []).forEach(v => {
        const banner = document.createElement('div');
        banner.className = 'vote-banner';
        const tally = JSON.stringify(v.tally || {});
        banner.innerHTML = `
          <div class="info">
            <div class="proposal">🗳️ ${escapeHtml(v.proposal)}</div>
            <div class="tally">${v.total_responses}/${v.total_members} voted · ${tally}</div>
          </div>
          <div class="actions">
            ${v.options.map(opt => `<button class="vote-btn ${opt.includes('approve') ? 'approve' : opt.includes('reject') ? 'reject' : 'changes'}" onclick="castVote('${v.vote_id}', '${opt}')">${opt}</button>`).join('')}
          </div>
        `;
        conv.appendChild(banner);
        conv.scrollTop = conv.scrollHeight;
      });
    });
  }
}

// === Actions ===

let mentionState = { active: false, query: '', start: 0, selected: 0, items: [] };
let currentMembers = [];  // populated when session loads

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !currentSessionId) return;
  input.value = '';
  autoResize(input);
  hideMentionDropdown();
  // Send via Socket.IO
  if (socket && socket.connected) {
    socket.emit("post_message", { session_id: currentSessionId, content });
  } else {
    // Fallback to REST
    try {
      const result = await api('POST', `/api/sessions/${currentSessionId}/message`, { agent_id: 'human', content });
      if (result.role) appendMessage(result);
    } catch (e) { console.error('Send failed:', e); input.value = content; autoResize(input); }
  }
}

function handleInputKey(e) {
  // Handle mention dropdown navigation
  if (mentionState.active) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      mentionState.selected = Math.min(mentionState.selected + 1, mentionState.items.length - 1);
      renderMentionDropdown();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      mentionState.selected = Math.max(mentionState.selected - 1, 0);
      renderMentionDropdown();
      return;
    }
    if (e.key === 'Enter' || e.key === 'Tab') {
      e.preventDefault();
      insertMention(mentionState.items[mentionState.selected]);
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      hideMentionDropdown();
      return;
    }
  }

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function handleInput(el) {
  autoResize(el);
  const cursorPos = el.selectionStart;
  const text = el.value.substring(0, cursorPos);

  // Find the last @ that's part of a word being typed
  const atMatch = text.match(/@(\w*)$/);
  if (atMatch) {
    mentionState.active = true;
    mentionState.query = atMatch[1];
    mentionState.start = cursorPos - atMatch[0].length;
    mentionState.selected = 0;
    updateMentionItems();
    renderMentionDropdown();
  } else {
    hideMentionDropdown();
  }
}

function updateMentionItems() {
  const q = mentionState.query.toLowerCase();
  mentionState.items = currentMembers.filter(m =>
    m.id.toLowerCase().includes(q) || m.role.toLowerCase().includes(q)
  );
  if (mentionState.selected >= mentionState.items.length) {
    mentionState.selected = 0;
  }
}

function renderMentionDropdown() {
  const dropdown = document.getElementById('mentionDropdown');
  if (!dropdown) return;
  if (!mentionState.active || mentionState.items.length === 0) {
    dropdown.classList.remove('visible');
    return;
  }

  // Position dropdown above the input area
  const textarea = document.getElementById('msgInput');
  if (!textarea) return;
  const rect = textarea.getBoundingClientRect();
  dropdown.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
  dropdown.style.left = (rect.left + 20) + 'px';

  dropdown.innerHTML = mentionState.items.map((m, i) => {
    const roleClass = `role-${m.role}`;
    const idHtml = highlightMatch(m.id, mentionState.query);
    const isSelected = i === mentionState.selected ? ' selected' : '';
    return `<div class="mention-item${isSelected}" data-index="${i}" data-id="${m.id}" onmousedown="event.preventDefault(); insertMention(mentionState.items[${i}])">
      <span class="role-tag ${roleClass}">${m.role}</span>
      <span class="id">${idHtml}</span>
      <span class="dim">${m.model || ''}</span>
    </div>`;
  }).join('');
  dropdown.classList.add('visible');
}

function highlightMatch(id, query) {
  if (!query) return escapeHtml(id);
  const idx = id.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return escapeHtml(id);
  return escapeHtml(id.substring(0, idx)) +
    '<span class="filter-match">' + escapeHtml(id.substring(idx, idx + query.length)) + '</span>' +
    escapeHtml(id.substring(idx + query.length));
}

function hideMentionDropdown() {
  mentionState.active = false;
  const dropdown = document.getElementById('mentionDropdown');
  if (dropdown) dropdown.classList.remove('visible');
}

function insertMention(item) {
  if (!item) return;
  const textarea = document.getElementById('msgInput');
  const before = textarea.value.substring(0, mentionState.start);
  const after = textarea.value.substring(textarea.selectionStart);
  textarea.value = before + '@' + item.id + ' ' + after;
  const newPos = before.length + item.id.length + 2;
  textarea.focus();
  textarea.setSelectionRange(newPos, newPos);
  hideMentionDropdown();
  autoResize(textarea);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function castVote(voteId, response) {
  if (!currentSessionId) return;
  const rationale = prompt(`Voting "${response}" — add rationale (optional):`) || '';
  if (socket && socket.connected) {
    socket.emit("cast_vote", { session_id: currentSessionId, vote_id: voteId, response, rationale });
  } else {
    await api('POST', `/api/sessions/${currentSessionId}/vote/respond`, { agent_id: 'human', vote_id: voteId, response, rationale });
  }
}

async function stopAgents() {
  if (!currentSessionId) return;
  if (socket && socket.connected) {
    socket.emit("stop_agents", { session_id: currentSessionId });
  } else {
    await api('POST', `/api/sessions/${currentSessionId}/stop`, {});
  }
  selectSession(currentSessionId);
}

async function startAgents() {
  if (!currentSessionId) return;
  if (socket && socket.connected) {
    socket.emit("start_agents", { session_id: currentSessionId });
  } else {
    await api('POST', `/api/sessions/${currentSessionId}/start`, {});
  }
  selectSession(currentSessionId);
}

async function deleteSession() {
  if (!currentSessionId) return;
  if (!confirm('Delete this session? This cannot be undone.')) return;
  await api('DELETE', `/api/sessions/${currentSessionId}`);
  currentSessionId = null;
  document.getElementById('mainArea').innerHTML = '<div class="empty-state"><div class="icon">🏛️</div><div class="text">No session selected</div></div>';
  document.getElementById('agentsPanel').style.display = 'none';
  loadSessions();
}

// === New Session Modal ===

function showNewSessionModal() {
  document.getElementById('newSessionModal').style.display = 'flex';
  document.getElementById('taskInput').focus();
}

function hideNewSessionModal() {
  document.getElementById('newSessionModal').style.display = 'none';
}

async function createSession() {
  const task = document.getElementById('taskInput').value.trim();
  const workdir = document.getElementById('workdirInput').value.trim() || '.';
  const consensus = document.getElementById('consensusInput').value;
  const autoStart = document.getElementById('autoStartInput').value === 'true';

  if (!task) return;

  hideNewSessionModal();
  const data = await api('POST', '/api/sessions', { task, workdir, consensus, auto_start: autoStart });
  loadSessions();
  selectSession(data.id);

  // Clear inputs
  document.getElementById('taskInput').value = '';
}

// === Utility ===

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

// === Init ===

loadSessions();
setInterval(loadSessions, 5000); // refresh session list periodically
</script>
